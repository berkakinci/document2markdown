name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ --ignore=tests/test_live_vector.py -v --tb=short
